<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #333;
        }
        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Bem-vindo ao meu novo site!</h1>
    <p>Este é um modelo básico criado com HTML e CSS.</p>
    <button onclick="clique Aqui()">Clique Aqui</button>

    <script>
        function cliqueAqui() {
            alert('Obrigado por visitar o site!');
        }
    </script>
</body>
</html>
